<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TETA Admin - Maç Girişi</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #222; padding: 20px; border-radius: 10px; }
        select, input { background: #333; color: white; border: 1px solid #444; padding: 10px; margin: 10px 0; width: 100%; border-radius: 5px; }
        .match-row { display: flex; align-items: center; gap: 10px; justify-content: center; }
        .match-row input { width: 60px; font-size: 20px; text-align: center; }
        button { background: #00d4ff; color: #000; padding: 15px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        #status { margin-top: 15px; text-align: center; color: #00ff00; }
    </style>
</head>
<body>

<div class="container">
    <h2>TETA LEAGUE - Maç Skoru Gir</h2>
    
    <input type="password" id="token" placeholder="GitHub Token">

    <label>Ev Sahibi</label>
    <select id="homeTeam"></select>

    <div class="match-row">
        <input type="number" id="homeScore" value="0">
        <span>-</span>
        <input type="number" id="awayScore" value="0">
    </div>

    <label>Deplasman</label>
    <select id="awayTeam"></select>

    <button onclick="maciIsle()">SKORU LİGE İŞLE VE KAYDET</button>
    <div id="status"></div>
</div>

<script>
    const GITHUB_USER = 'Cemal4459';
    const GITHUB_REPO = 'teta-league';
    let teams = [];
    let currentSha = '';

async function verileriYukle() {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/data.json`, {
            headers: { 'Cache-Control': 'no-cache' }
        });
        const fileData = await res.json();
        currentSha = fileData.sha;
        // Base64 decode işlemi (Türkçe karakter sorunu olmaması için)
        const content = decodeURIComponent(escape(atob(fileData.content)));
        teams = JSON.parse(content);

        const homeSelect = document.getElementById('homeTeam');
        const awaySelect = document.getElementById('awayTeam');
        
        const options = teams.map(t => `<option value="${t.name}">${t.name}</option>`).join('');
        homeSelect.innerHTML = options;
        awaySelect.innerHTML = options;
    }

    async function maciIsle() {
        const homeName = document.getElementById('homeTeam').value;
        const awayName = document.getElementById('awayTeam').value;
        const homeS = parseInt(document.getElementById('homeScore').value);
        const awayS = parseInt(document.getElementById('awayScore').value);
        const token = document.getElementById('token').value;

        if (homeName === awayName) return alert("Aynı takımları seçemezsin!");
        if (!token) return alert("Token girmelisin!");

        const home = teams.find(t => t.name === homeName);
        const away = teams.find(t => t.name === awayName);

        // İstatistikleri güncelle
        home.p += 1; away.p += 1; // Oynanan maç
        home.gd += (homeS - awayS);
        away.gd += (awayS - homeS);

        if (homeS > awayS) {
            home.w += 1; home.pts += 3;
            away.l += 1;
        } else if (homeS < awayS) {
            away.w += 1; away.pts += 3;
            home.l += 1;
        } else {
            home.d += 1; home.pts += 1;
            away.d += 1; away.pts += 1;
        }

        // GitHub'a gönder
        const status = document.getElementById('status');
        status.innerText = "GitHub'a gönderiliyor...";

        const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/data.json`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: `${homeName} ${homeS}-${awayS} ${awayName} maçı işlendi`,
                content: btoa(JSON.stringify(teams, null, 2)),
                sha: currentSha
            })
        });

        if (response.ok) {
            status.innerText = "Maç başarıyla işlendi! Puan durumu güncellendi.";
            verileriYukle(); // Yeni SHA'yı al
        } else {
            status.innerText = "Hata! Tekrar dene.";
        }
    }

    verileriYukle();
</script>
</body>
</html>
