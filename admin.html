<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TETA Admin Panel</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; }
        .admin-container { max-width: 900px; margin: auto; }
        table { width: 100%; border-collapse: collapse; background: #222; }
        th, td { padding: 10px; border: 1px solid #444; text-align: center; }
        input { background: #333; color: white; border: 1px solid #555; padding: 5px; width: 50px; text-align: center; }
        .team-name { width: 150px; text-align: left; }
        .save-btn { background: #00d4ff; color: #000; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; width: 100%; }
        .config { margin-bottom: 20px; padding: 15px; background: #333; border-radius: 5px; }
        #status { margin-top: 10px; color: #00ff00; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>TETA LEAGUE S4 - Admin Paneli</h2>
    
    <div class="config">
        <input type="password" id="token" placeholder="GitHub Token Giriniz" style="width: 300px;">
        <p style="font-size: 12px; color: #aaa;">*Token'ı her seferinde yazmak istemiyorsan kodun içine 'token' değişkenine yapıştırabilirsin.</p>
    </div>

    <table id="admin-table">
        <thead>
            <tr>
                <th>Takım</th><th>O</th><th>G</th><th>B</th><th>M</th><th>GD</th><th>PTS</th>
            </tr>
        </thead>
        <tbody id="admin-body"></tbody>
    </table>

    <button class="save-btn" onclick="kaydet()">DEĞİŞİKLİKLERİ GITHUB'A GÖNDER</button>
    <div id="status"></div>
</div>

<script>
    const GITHUB_USER = 'Cemal4459';
    const GITHUB_REPO = 'teta-league';
    let currentSha = '';

    async function verileriYukle() {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/data.json?v=${Date.now()}`);
        const fileData = await res.json();
        currentSha = fileData.sha; // GitHub güncelleme için bu kodu ister
        const teams = JSON.parse(atob(fileData.content));

        const tbody = document.getElementById('admin-body');
        tbody.innerHTML = teams.map((t, i) => `
            <tr>
                <td class="team-name">${t.name}</td>
                <td><input type="number" value="${t.p}" class="p"></td>
                <td><input type="number" value="${t.w}" class="w"></td>
                <td><input type="number" value="${t.d}" class="d"></td>
                <td><input type="number" value="${t.l}" class="l"></td>
                <td><input type="number" value="${t.gd}" class="gd"></td>
                <td><input type="number" value="${t.pts}" class="pts"></td>
            </tr>
        `).join('');
    }

    async function kaydet() {
        const status = document.getElementById('status');
        const token = document.getElementById('token').value;
        if(!token) return alert("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");

        status.innerText = "Güncelleniyor...";
        
        const rows = document.querySelectorAll('#admin-body tr');
        const updatedData = Array.from(rows).map(row => ({
            name: row.querySelector('.team-name').innerText,
            p: parseInt(row.querySelector('.p').value),
            w: parseInt(row.querySelector('.w').value),
            d: parseInt(row.querySelector('.d').value),
            l: parseInt(row.querySelector('.l').value),
            gd: parseInt(row.querySelector('.gd').value),
            pts: parseInt(row.querySelector('.pts').value)
        }));

        const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/data.json`, {
            method: 'PUT',
            headers: {
                'Authorization': `token ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                message: "Skorlar admin panelinden güncellendi",
                content: btoa(JSON.stringify(updatedData, null, 2)),
                sha: currentSha
            })
        });

        if(response.ok) {
            status.innerText = "Başarıyla güncellendi! Siten 10-20 saniye içinde yenilenecek.";
            verileriYukle(); // SHA'yı tazele
        } else {
            status.innerText = "Hata oluştu! Token'ı kontrol et.";
        }
    }

    verileriYukle();
</script>
</body>
</html>
