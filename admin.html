<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TETA Admin - Maç Girişi</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #111111 0%, #181818 100%);
            color: white;
            font-family: "Segoe UI", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 520px;
            background: linear-gradient(180deg, #202020 0%, #1a1a1a 100%);
            padding: 30px 24px;
            border-radius: 18px;
            border: 1px solid #3d3d3d;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
        }

        h2 {
            text-align: center;
            color: #00d4ff;
            margin-top: 4px;
            margin-bottom: 24px;
            font-size: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 15px;
        }

        input,
        select {
            width: 100%;
            background: #323232;
            color: white;
            border: 1px solid #4a4a4a;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 18px;
            font-size: 15px;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.12);
        }

        .token-wrap {
            position: relative;
        }

        .toggle-token {
            position: absolute;
            right: 10px;
            top: 10px;
            background: transparent;
            border: none;
            color: #9ddfff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            padding: 4px 6px;
            width: auto;
        }

        .match-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin: 10px 0 22px;
        }

        .score-input {
            width: 58px;
            height: 58px;
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            border-radius: 10px;
            margin-bottom: 0;
        }

        .dash {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
        }

        button {
            width: 100%;
            background: #19c0e3;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            background: #0fb0d2;
        }

        button:active {
            transform: scale(0.985);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        #status {
            min-height: 26px;
            margin-top: 18px;
            text-align: center;
            font-weight: 700;
            color: #d8faff;
        }

        .note {
            margin-top: 14px;
            text-align: center;
            color: #bfbfbf;
            font-size: 13px;
            line-height: 1.5;
        }

        .last-match {
            margin-top: 16px;
            padding: 12px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            color: #dcefff;
            font-size: 14px;
            text-align: center;
            min-height: 42px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Maç Sonucu Gir</h2>

        <div class="token-wrap">
            <input type="password" id="token" placeholder="GitHub token gir" autocomplete="off" />
            <button type="button" class="toggle-token" onclick="toggleToken()">Göster</button>
        </div>

        <label for="homeTeam">Ev Sahibi</label>
        <select id="homeTeam"></select>

        <div class="match-row">
            <input class="score-input" type="number" id="homeScore" value="0" min="0" />
            <span class="dash">-</span>
            <input class="score-input" type="number" id="awayScore" value="0" min="0" />
        </div>

        <label for="awayTeam">Deplasman</label>
        <select id="awayTeam"></select>

        <button id="saveBtn" onclick="maciIsle()">LİGE KAYDET</button>

        <div id="status">Veriler yükleniyor...</div>
        <div class="last-match" id="lastMatch">Henüz maç kaydedilmedi.</div>

        <div class="note">
            Aynı takım iki tarafta seçilemez. Kaydetmeden önce skoru ve takımları kontrol et.
        </div>
    </div>

    <script>
        const GITHUB_USER = "Cemal4459";
        const GITHUB_REPO = "teta-league";

        let teams = [];
        let currentSha = "";

        function setStatus(message, color = "#d8faff") {
            const status = document.getElementById("status");
            status.textContent = message;
            status.style.color = color;
        }

        function toggleToken() {
            const tokenInput = document.getElementById("token");
            const btn = document.querySelector(".toggle-token");

            if (tokenInput.type === "password") {
                tokenInput.type = "text";
                btn.textContent = "Gizle";
            } else {
                tokenInput.type = "password";
                btn.textContent = "Göster";
            }
        }

        function ensureTeamFields(team) {
            if (typeof team.p !== "number") team.p = 0;
            if (typeof team.w !== "number") team.w = 0;
            if (typeof team.d !== "number") team.d = 0;
            if (typeof team.l !== "number") team.l = 0;
            if (typeof team.gd !== "number") team.gd = 0;
            if (typeof team.pts !== "number") team.pts = 0;
        }

        function fillTeamSelects() {
            const homeSelect = document.getElementById("homeTeam");
            const awaySelect = document.getElementById("awayTeam");

            const currentHome = homeSelect.value;
            const currentAway = awaySelect.value;

            homeSelect.innerHTML = teams
                .map(team => `<option value="${team.name}">${team.name}</option>`)
                .join("");

            const selectedHome = teams.some(t => t.name === currentHome)
                ? currentHome
                : teams[0]?.name || "";

            homeSelect.value = selectedHome;

            updateAwayOptions(selectedHome, currentAway);
        }

        function updateAwayOptions(homeName, preferredAway = "") {
            const awaySelect = document.getElementById("awayTeam");

            const filtered = teams.filter(team => team.name !== homeName);

            awaySelect.innerHTML = filtered
                .map(team => `<option value="${team.name}">${team.name}</option>`)
                .join("");

            if (filtered.some(team => team.name === preferredAway)) {
                awaySelect.value = preferredAway;
            } else if (filtered.length > 0) {
                awaySelect.value = filtered[0].name;
            }
        }

        async function verileriYukle() {
            try {
                setStatus("Veriler yükleniyor...");

                const res = await fetch(
                    `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/data.json?v=${Date.now()}`,
                    { cache: "no-store" }
                );

                if (!res.ok) {
                    throw new Error("GitHub verisi alınamadı.");
                }

                const fileData = await res.json();
                currentSha = fileData.sha;

                const content = decodeURIComponent(escape(atob(fileData.content)));
                teams = JSON.parse(content);

                teams.forEach(ensureTeamFields);
                fillTeamSelects();

                setStatus("Veriler hazır.", "#9fffb8");
            } catch (error) {
                console.error(error);
                setStatus("Hata: Veri çekilemedi.", "#ff8d8d");
            }
        }

        async function maciIsle() {
            const homeName = document.getElementById("homeTeam").value;
            const awayName = document.getElementById("awayTeam").value;
            const homeS = parseInt(document.getElementById("homeScore").value, 10);
            const awayS = parseInt(document.getElementById("awayScore").value, 10);
            const token = document.getElementById("token").value.trim();
            const saveBtn = document.getElementById("saveBtn");
            const lastMatch = document.getElementById("lastMatch");

            if (!token) {
                alert("Lütfen GitHub token gir.");
                return;
            }

            if (!homeName || !awayName) {
                alert("Takımları seç.");
                return;
            }

            if (homeName === awayName) {
                alert("Aynı takım iki kez seçilemez.");
                return;
            }

            if (isNaN(homeS) || isNaN(awayS) || homeS < 0 || awayS < 0) {
                alert("Geçerli bir skor gir.");
                return;
            }

            const home = teams.find(team => team.name === homeName);
            const away = teams.find(team => team.name === awayName);

            if (!home || !away) {
                alert("Takımlar bulunamadı.");
                return;
            }

            const updatedTeams = JSON.parse(JSON.stringify(teams));

            const updatedHome = updatedTeams.find(team => team.name === homeName);
            const updatedAway = updatedTeams.find(team => team.name === awayName);

            ensureTeamFields(updatedHome);
            ensureTeamFields(updatedAway);

            updatedHome.p += 1;
            updatedAway.p += 1;

            updatedHome.gd += (homeS - awayS);
            updatedAway.gd += (awayS - homeS);

            if (homeS > awayS) {
                updatedHome.w += 1;
                updatedHome.pts += 3;
                updatedAway.l += 1;
            } else if (homeS < awayS) {
                updatedAway.w += 1;
                updatedAway.pts += 3;
                updatedHome.l += 1;
            } else {
                updatedHome.d += 1;
                updatedAway.d += 1;
                updatedHome.pts += 1;
                updatedAway.pts += 1;
            }

            try {
                saveBtn.disabled = true;
                setStatus("Kaydediliyor...");

                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/data.json`,
                    {
                        method: "PUT",
                        headers: {
                            "Authorization": `token ${token}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            message: `Maç: ${homeName} ${homeS}-${awayS} ${awayName}`,
                            content: btoa(unescape(encodeURIComponent(JSON.stringify(updatedTeams, null, 2)))),
                            sha: currentSha
                        })
                    }
                );

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.message || "Güncelleme başarısız.");
                }

                teams = updatedTeams;

                setStatus("Başarılı! Tablo güncellendi.", "#86ff9e");
                lastMatch.textContent = `Son kayıt: ${homeName} ${homeS} - ${awayS} ${awayName}`;

                document.getElementById("homeScore").value = 0;
                document.getElementById("awayScore").value = 0;

                await verileriYukle();
            } catch (error) {
                console.error(error);
                setStatus(`Hata: ${error.message}`, "#ff8d8d");
            } finally {
                saveBtn.disabled = false;
            }
        }

        document.getElementById("homeTeam").addEventListener("change", (e) => {
            const currentAway = document.getElementById("awayTeam").value;
            updateAwayOptions(e.target.value, currentAway);
        });

        verileriYukle();
    </script>
</body>
</html>
