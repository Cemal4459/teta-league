<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TETA Admin - Maç Girişi</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: #222; padding: 30px; border-radius: 15px; border: 1px solid #444; }
        input, select { background: #333; color: white; border: 1px solid #444; padding: 12px; margin: 10px 0; width: 100%; border-radius: 8px; box-sizing: border-box; }
        .match-row { display: flex; align-items: center; gap: 15px; justify-content: center; margin: 20px 0; }
        .match-row input { width: 70px; font-size: 24px; font-weight: bold; text-align: center; }
        button { background: #00d4ff; color: #000; padding: 15px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #0099bb; }
        #status { margin-top: 20px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="text-align: center; color: #00d4ff;">Maç Sonucu Gir</h2>
    <input type="password" id="token" placeholder="GitHub Token Yapıştırın">
    
    <label>Ev Sahibi</label>
    <select id="homeTeam"></select>

    <div class="match-row">
        <input type="number" id="homeScore" value="0" min="0">
        <span style="font-size: 24px;">-</span>
        <input type="number" id="awayScore" value="0" min="0">
    </div>

    <label>Deplasman</label>
    <select id="awayTeam"></select>

    <button onclick="maciIsle()">LİGE KAYDET</button>
    <div id="status">Bekleniyor...</div>
</div>

<script>
    const GITHUB_USER = 'Cemal4459';
    const GITHUB_REPO = 'teta-league';
    let teams = [];
    let currentSha = '';

    async function verileriYukle() {
        const status = document.getElementById('status');
        try {
            const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/data.json?v=${Date.now()}`);
            const fileData = await res.json();
            currentSha = fileData.sha;
            // Türkçe karakter desteği için decode işlemi
            const content = decodeURIComponent(escape(atob(fileData.content)));
            teams = JSON.parse(content);

            const homeSelect = document.getElementById('homeTeam');
            const awaySelect = document.getElementById('awayTeam');
            const options = teams.map(t => `<option value="${t.name}">${t.name}</option>`).join('');
            
            homeSelect.innerHTML = options;
            awaySelect.innerHTML = options;
            status.innerText = "Veriler hazır.";
        } catch (e) {
            status.innerText = "Hata: Veri çekilemedi!";
            console.error(e);
        }
    }

    async function maciIsle() {
        const homeName = document.getElementById('homeTeam').value;
        const awayName = document.getElementById('awayTeam').value;
        const homeS = parseInt(document.getElementById('homeScore').value);
        const awayS = parseInt(document.getElementById('awayScore').value);
        const token = document.getElementById('token').value;
        const status = document.getElementById('status');

        if (homeName === awayName) return alert("Aynı takımları seçemezsin!");
        if (!token) return alert("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");

        status.innerText = "Hesaplanıyor ve Gönderiliyor...";

        const home = teams.find(t => t.name === homeName);
        const away = teams.find(t => t.name === awayName);

        // İstatistikleri güncelle (O, GD, PTS vb.)
        home.p += 1; away.p += 1;
        home.gd += (homeS - awayS);
        away.gd += (awayS - homeS);

        if (homeS > awayS) { home.w += 1; home.pts += 3; away.l += 1; }
        else if (homeS < awayS) { away.w += 1; away.pts += 3; home.l += 1; }
        else { home.d += 1; home.pts += 1; away.d += 1; away.pts += 1; }

        try {
            const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/data.json`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: `Maç: ${homeName} ${homeS}-${awayS} ${awayName}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(teams, null, 2)))),
                    sha: currentSha
                })
            });

            if (response.ok) {
                status.innerText = "BAŞARILI! Tablo güncellendi.";
                status.style.color = "#00ff00";
                verileriYukle(); // SHA yenile
            } else {
                status.innerText = "Hata: Token yanlış olabilir.";
                status.style.color = "#ff0000";
            }
        } catch (e) { status.innerText = "Bağlantı hatası!"; }
    }
    verileriYukle();
</script>
</body>
</html>
