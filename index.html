<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TETA LEAGUE S4 - LIVE</title>
    <style>
        body {
            background-color: #02051a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .wrapper {
            width: 1000px; 
            height: 1000px;
            background-image: url('teta-tablo.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: relative;
        }

        .table-container {
            position: absolute;
            /* Yazıların yukarıdan başladığı yer */
            top: 242px;    
            left: 145px;   
            width: 615px;  
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        /* Başlık boşluğunu kaldırdık, ilk satırdan başlatıyoruz */
        td {
            height: 42.4px; /* Çizgilerin arasına tam oturan altın oran */
            color: white;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            padding: 0;
            vertical-align: middle;
        }

        .col-rank { width: 45px; text-align: right; padding-right: 18px; }
        .col-name { width: 230px; text-align: left; white-space: nowrap; overflow: hidden; }
        .col-stats { width: 47px; }
        .col-pts { 
            width: 55px; 
            color: #00d4ff; 
            font-size: 20px; 
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8); 
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="table-container">
        <table>
            <tbody id="league-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    async function loadTable() {
        try {
            const res = await fetch('data.json?v=' + Date.now());
            const teams = await res.json();
            
            teams.sort((a, b) => b.pts - a.pts || b.gd - a.gd);

            const tbody = document.getElementById('league-body');
            tbody.innerHTML = teams.map((t, i) => `
                <tr>
                    <td class="col-rank">${i + 1}</td>
                    <td class="col-name">${t.name}</td>
                    <td class="col-stats">${t.p}</td>
                    <td class="col-stats">${t.w}</td>
                    <td class="col-stats">${t.d}</td>
                    <td class="col-stats">${t.l}</td>
                    <td class="col-stats">${t.gd}</td>
                    <td class="col-pts">${t.pts}</td>
                </tr>
            `).join('');
        } catch (e) { console.error("Hata:", e); }
    }
    loadTable();
    setInterval(loadTable, 30000);
</script>

</body>
</html>
