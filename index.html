<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TETA LEAGUE S4 - LIVE</title>
    <style>
        body {
            background-color: #02051a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Ana Çerçeve */
        .wrapper {
            width: 1000px; 
            height: 1000px;
            background-image: url('teta-tablo.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: relative;
        }

        /* Tabloyu resmin içine tam oturtan bölge */
        .table-container {
            position: absolute;
            top: 228px;    /* Yazıları biraz yukarı çektim */
            left: 145px;   /* Sola hizaladım */
            width: 615px;  
            height: 520px; 
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        /* Başlık boşluğu ayarı */
        .hidden-header { 
            height: 48px; 
            visibility: hidden; 
        }

        /* Takım satırları - Çizgilerin tam ortasına sığması için */
        td {
            height: 38.5px; 
            color: white;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            padding: 0;
            vertical-align: middle;
        }

        /* Sütun Hizalamaları */
        .col-rank { width: 45px; text-align: right; padding-right: 18px; }
        .col-name { width: 230px; text-align: left; white-space: nowrap; overflow: hidden; }
        .col-stats { width: 47px; }
        .col-pts { 
            width: 55px; 
            color: #00d4ff; 
            font-size: 18px; 
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8); 
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="table-container">
        <table>
            <thead>
                <tr class="hidden-header">
                    <th class="col-rank"></th>
                    <th class="col-name"></th>
                    <th class="col-stats"></th><th class="col-stats"></th>
                    <th class="col-stats"></th><th class="col-stats"></th>
                    <th class="col-stats"></th><th class="col-pts"></th>
                </tr>
            </thead>
            <tbody id="league-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    async function loadTable() {
        try {
            const res = await fetch('data.json?v=' + Date.now());
            const teams = await res.json();
            
            // Sıralama: Önce puan, sonra averaj
            teams.sort((a, b) => b.pts - a.pts || b.gd - a.gd);

            const tbody = document.getElementById('league-body');
            tbody.innerHTML = teams.map((t, i) => `
                <tr>
                    <td class="col-rank">${i + 1}</td>
                    <td class="col-name">${t.name}</td>
                    <td class="col-stats">${t.p}</td>
                    <td class="col-stats">${t.w}</td>
                    <td class="col-stats">${t.d}</td>
                    <td class="col-stats">${t.l}</td>
                    <td class="col-stats">${t.gd}</td>
                    <td class="col-pts">${t.pts}</td>
                </tr>
            `).join('');
        } catch (e) { console.error("Hata:", e); }
    }
    loadTable();
    setInterval(loadTable, 30000); // 30 saniyede bir güncelle
</script>

</body>
</html>
