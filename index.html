<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TETA LEAGUE S4 - LIVE</title>
    <style>
        /* Tasarım Renkleri ve Değişkenler */
        :root {
            --bg-dark: #02051a; 
            --card-bg: rgba(5, 10, 48, 0.82); /* Saydam koyu lacivert */
            --cyan: #00d4ff; 
            --border-color: rgba(255, 255, 255, 0.9); /* Ana beyaz çerçeve */
            --row-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            /* Arka plana yüklediğin resmi buraya bağlıyoruz */
            background-image: linear-gradient(rgba(2, 5, 26, 0.4), rgba(2, 5, 26, 0.4)), url('arka-plan.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Ana Puan Tablosu Kartı */
        .league-container {
            width: 850px;
            background: var(--card-bg);
            border: 3px solid white; /* Tasarımdaki kalın beyaz çerçeve */
            border-radius: 25px;
            padding: 40px;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
        }

        /* Başlık (TETA LEAGUE S4) */
        .header {
            text-align: center;
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 6px;
            margin-bottom: 20px;
            text-transform: uppercase;
            position: absolute;
            top: -100px;
            left: 0;
            right: 0;
        }

        .header span {
            color: var(--cyan);
        }

        /* Dikey GROUP DELTA Yazısı */
        .vertical-text {
            position: absolute;
            right: -180px;
            top: 50%;
            transform: rotate(90deg) translateY(-50%);
            font-size: 7.5rem;
            font-weight: 900;
            color: var(--cyan);
            opacity: 0.6;
            letter-spacing: 12px;
            white-space: nowrap;
            text-transform: uppercase;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        /* Başlık Satırı (TEAMS P W D L GD PTS) */
        thead tr {
            border-bottom: 2px solid white;
        }

        th {
            padding: 12px;
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        td {
            padding: 15px 10px;
            text-align: center;
            border-bottom: 1px solid var(--row-border);
            font-size: 1.15rem;
        }

        /* Takım Hücresi (Sıra ve İsim) */
        .team-cell {
            text-align: left;
            display: flex;
            align-items: center;
            gap: 20px;
            font-weight: 600;
        }

        .rank-number {
            font-size: 1.3rem;
            font-weight: 900;
            width: 30px;
        }

        /* PTS Sütunu Neon */
        .pts-column {
            color: var(--cyan);
            font-weight: 900;
            font-size: 1.4rem;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.7);
        }

        /* Sağ Üst Küçük Logo (Opsiyonel) */
        .corner-logo {
            position: absolute;
            top: -110px;
            right: 0;
            width: 80px;
        }

        /* Hover Efekti */
        tr:hover td {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div class="header">TETA LEAGUE <span>S4</span></div>
    
    <div class="league-container">
        <div class="vertical-text">GROUP DELTA</div>
        
        <table>
            <thead>
                <tr>
                    <th style="text-align: left; padding-left: 50px;">TEAMS</th>
                    <th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>PTS</th>
                </tr>
            </thead>
            <tbody id="league-body">
                </tbody>
        </table>
    </div>

    <script>
        async function loadTable() {
            try {
                // data.json dosyasını çekiyoruz
                const res = await fetch('data.json?v=' + Date.now());
                const teams = await res.json();

                // Puana, sonra averaja (GD) göre sıralama
                teams.sort((a, b) => b.pts - a.pts || b.gd - a.gd);

                const tbody = document.getElementById('league-body');
                tbody.innerHTML = teams.map((t, i) => `
                    <tr>
                        <td class="team-cell">
                            <span class="rank-number">${i + 1}</span>
                            ${t.name}
                        </td>
                        <td>${t.p}</td>
                        <td>${t.w}</td>
                        <td>${t.d}</td>
                        <td>${t.l}</td>
                        <td>${t.gd}</td>
                        <td class="pts-column">${t.pts}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error("Tablo güncellenirken hata:", error);
            }
        }

        // Sayfa açıldığında yükle
        loadTable();
        // Her 30 saniyede bir otomatik tazele (Sayfayı yenilemeye gerek kalmasın)
        setInterval(loadTable, 30000);
    </script>

</body>
</html>
