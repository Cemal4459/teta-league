<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TETA LEAGUE S4 - LIVE</title>
    <style>
        body {
            background-color: #02051a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }

        /* Ana Çerçeve: Arka plana senin boş görselini koyuyoruz */
        .wrapper {
            width: 900px;
            height: 900px;
            background-image: url('teta-tablo.png'); /* Görsel adını kontrol et */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: relative;
        }

        /* Tabloyu resmin içindeki beyaz kutuya tam oturtmak için */
        .table-container {
            position: absolute;
            top: 195px;    /* Üstten boşluk (Resme göre ayarlandı) */
            left: 108px;   /* Soldan boşluk */
            width: 580px;  /* Tablonun genişliği */
            height: 565px; /* Tablonun toplam yüksekliği */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* Hücre boyutlarını sabitler */
        }

        td {
            height: 43.5px; /* Satır yüksekliği (Resmindeki çizgiler arası mesafe) */
            color: white;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            padding: 0;
            vertical-align: middle;
        }

        /* Sütun Genişlik Ayarları */
        .col-rank { width: 40px; text-align: right; padding-right: 15px; }
        .col-name { width: 220px; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .col-stats { width: 45px; }
        .col-pts { width: 50px; color: #00d4ff; font-size: 18px; text-shadow: 0 0 10px rgba(0, 212, 255, 0.5); }

        /* Başlıkları gizliyoruz çünkü resimde zaten yazıyor */
        .hidden-header { height: 40px; visibility: hidden; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="table-container">
        <table>
            <thead>
                <tr class="hidden-header">
                    <th class="col-rank"></th>
                    <th class="col-name"></th>
                    <th class="col-stats"></th><th class="col-stats"></th>
                    <th class="col-stats"></th><th class="col-stats"></th>
                    <th class="col-stats"></th><th class="col-pts"></th>
                </tr>
            </thead>
            <tbody id="league-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    async function loadTable() {
        try {
            const res = await fetch('data.json?v=' + Date.now());
            const teams = await res.json();
            teams.sort((a, b) => b.pts - a.pts || b.gd - a.gd);

            const tbody = document.getElementById('league-body');
            tbody.innerHTML = teams.map((t, i) => `
                <tr>
                    <td class="col-rank">${i + 1}</td>
                    <td class="col-name">${t.name}</td>
                    <td class="col-stats">${t.p}</td>
                    <td class="col-stats">${t.w}</td>
                    <td class="col-stats">${t.d}</td>
                    <td class="col-stats">${t.l}</td>
                    <td class="col-stats">${t.gd}</td>
                    <td class="col-pts">${t.pts}</td>
                </tr>
            `).join('');
        } catch (e) { console.error("Hata:", e); }
    }
    loadTable();
    setInterval(loadTable, 30000);
</script>

</body>
</html>
