<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TETA LEAGUE S4 - LIVE</title>
    <style>
        body {
            background-color: #02051a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* Resim ve tabloyu bir arada tutan ana kutu */
        .wrapper {
            width: 1000px;
            height: 1000px;
            background-image: url('teta-tablo.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: relative;
        }

        /* Tabloyu resmin üzerindeki beyaz alana tam oturtan katman */
        .overlay {
            position: absolute;
            top: 220px;    /* Başlık satırının başladığı yer */
            left: 120px;   /* Tablonun başladığı yer */
            width: 645px;  /* Tablo genişliği */
            height: 610px; /* 13 satırlık (1 başlık + 12 takım) toplam alan */
            display: grid;
            grid-template-rows: repeat(13, 1fr); /* Alanı 13 eşit parçaya böl */
        }

        .row {
            display: grid;
            /* Sütunları resimdeki başlıklara göre hizalar */
            grid-template-columns: 50px 250px 50px 50px 50px 50px 50px 60px;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        /* Resimde zaten başlık var, ilk satırı görünmez yapıyoruz ama yer kaplıyor */
        .header-spacer { visibility: hidden; }

        .center { text-align: center; }
        .num { text-align: right; padding-right: 20px; }
        .team { padding-left: 10px; white-space: nowrap; overflow: hidden; }
        
        /* Puan kısmına o neon maviyi veriyoruz */
        .pts { 
            color: #00d4ff; 
            font-size: 20px; 
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.7); 
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="overlay" id="league-content">
        </div>
</div>

<script>
    async function loadLeague() {
        try {
            const res = await fetch('data.json?v=' + Date.now());
            const teams = await res.json();
            
            // Puan ve Averaj sıralaması
            teams.sort((a, b) => b.pts - a.pts || b.gd - a.gd);

            const container = document.getElementById('league-content');
            
            // İlk satırı boşluk (spacer) olarak ekle
            let html = '<div class="row header-spacer"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>';

            // Takımları ekle
            teams.forEach((t, i) => {
                html += `
                <div class="row">
                    <div class="num">${i + 1}</div>
                    <div class="team">${t.name}</div>
                    <div class="center">${t.p}</div>
                    <div class="center">${t.w}</div>
                    <div class="center">${t.d}</div>
                    <div class="center">${t.l}</div>
                    <div class="center">${t.gd}</div>
                    <div class="center pts">${t.pts}</div>
                </div>`;
            });

            container.innerHTML = html;
        } catch (e) { console.error("Hata:", e); }
    }

    loadLeague();
    setInterval(loadLeague, 30000); // 30 saniyede bir güncelle
</script>

</body>
</html>
