<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TETA LEAGUE S4 - LIVE</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #02051a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", Arial, sans-serif;
            padding: 20px;
        }

        .wrapper {
            position: relative;
            width: min(95vw, 1000px);
            aspect-ratio: 1 / 1;
            background-image: url("teta-tablo.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Son güncelleme */
        .last-update {
            position: absolute;
            left: 50px;
            top: 95px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 15px;
            font-weight: 500;
        }

        /* TABLO KUTUSU */
        .overlay {
            position: absolute;
            top: 130px;
            left: 50px;
            width: 660px;

            padding: 20px 20px 16px;
            border-radius: 22px;

            background: linear-gradient(
                to bottom,
                rgba(3, 10, 35, 0.55) 0%,
                rgba(3, 10, 35, 0.45) 60%,
                rgba(3, 10, 35, 0.75) 100%
            );

            border: 1px solid rgba(0, 212, 255, 0.18);

            backdrop-filter: blur(7px);
            -webkit-backdrop-filter: blur(7px);

            box-shadow:
                0 0 25px rgba(0, 212, 255, 0.12),
                0 15px 45px rgba(0, 0, 0, 0.30);
        }

        /* Grid yapı */
        .table-head,
        .row {
            display: grid;
            grid-template-columns: 42px 2.5fr 50px 50px 50px 50px 60px 70px;
            align-items: center;
            column-gap: 8px;
        }

        /* Başlık */
        .table-head {
            color: #7defff;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* Satırlar */
        .row {
            min-height: 46px;
            font-size: 18px;
            color: white;
            font-weight: 600;
            border-radius: 14px;
            padding: 4px 8px;
            margin-bottom: 4px;
            transition: 0.25s;
        }

        .row:nth-child(even) {
            background: rgba(255,255,255,0.04);
        }

        /* İlk 3 */
        .top3 {
            background: rgba(255, 215, 0, 0.10) !important;
        }

        /* Son 3 */
        .bottom3 {
            background: rgba(255, 60, 60, 0.10) !important;
        }

        .num, .center {
            text-align: center;
        }

        .team {
            padding-left: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Puan */
        .pts {
            color: #00d4ff;
            font-size: 26px;
            font-weight: 900;
            text-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
        }

        /* Hata */
        .error {
            text-align: center;
            color: #ff8080;
            font-size: 16px;
        }

        /* Mobil */
        @media (max-width: 900px) {

            .overlay {
                left: 6%;
                width: 88%;
                top: 20%;
            }

            .table-head,
            .row {
                grid-template-columns: 20px 1.8fr 28px 28px 28px 28px 35px 40px;
            }

            .row {
                font-size: 11px;
                min-height: 28px;
            }

            .pts {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

<div class="wrapper">
    <div class="last-update" id="last-update">Yükleniyor...</div>
    <div class="overlay" id="league-content"></div>
</div>

<script>

function saatFormatla() {
    const now = new Date();
    return now.toLocaleTimeString("tr-TR");
}

async function loadLeague() {
    const container = document.getElementById("league-content");
    const updateText = document.getElementById("last-update");

    try {
        const res = await fetch("data.json?v=" + Date.now());
        const teams = await res.json();

        // Sıralama
        teams.sort((a, b) => b.pts - a.pts || b.gd - a.gd);

        let html = `
            <div class="table-head">
                <div>#</div>
                <div>TEAM</div>
                <div>P</div>
                <div>W</div>
                <div>D</div>
                <div>L</div>
                <div>GD</div>
                <div>PTS</div>
            </div>
        `;

        teams.forEach((t, i) => {
            let cls = "";
            if (i < 3) cls = "top3";
            else if (i >= teams.length - 3) cls = "bottom3";

            html += `
                <div class="row ${cls}">
                    <div class="num">${i+1}</div>
                    <div class="team" title="${t.name}">${t.name}</div>
                    <div class="center">${t.p}</div>
                    <div class="center">${t.w}</div>
                    <div class="center">${t.d}</div>
                    <div class="center">${t.l}</div>
                    <div class="center">${t.gd > 0 ? "+"+t.gd : t.gd}</div>
                    <div class="center pts">${t.pts}</div>
                </div>
            `;
        });

        container.innerHTML = html;
        updateText.innerText = "Son güncelleme: " + saatFormatla();

    } catch (err) {
        container.innerHTML = `<div class="error">Veri yüklenemedi</div>`;
    }
}

loadLeague();
setInterval(loadLeague, 30000);

</script>

</body>
</html>
