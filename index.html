<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TETA LEAGUE S4</title>
    <style>
        body {
            background-color: #02051a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .main-wrapper {
            width: 900px;
            height: 900px;
            background-image: url('teta-tablo.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            position: relative;
        }

        /* Verilerin oturacağı kutuyu resmin tam üzerine sabitledik */
        .grid-overlay {
            position: absolute;
            top: 200px;    /* Üst boşluk */
            left: 108px;   /* Sol boşluk */
            width: 580px;  /* Genişlik */
            height: 565px; /* Toplam yükseklik */
            display: grid;
            grid-template-rows: repeat(13, 1fr); /* 1 başlık + 12 takım */
        }

        .row {
            display: grid;
            grid-template-columns: 42px 225px 44px 44px 44px 44px 44px 50px;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        /* Başlık satırını gizliyoruz çünkü resimde yazıyor */
        .header-row { visibility: hidden; }

        .center { text-align: center; }
        .right { text-align: right; padding-right: 15px; }
        .team-name { padding-left: 5px; white-space: nowrap; overflow: hidden; }
        .pts { color: #00d4ff; font-size: 17px; text-shadow: 0 0 8px rgba(0, 212, 255, 0.6); }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="grid-overlay" id="league-content">
        </div>
</div>

<script>
    async function updateLeague() {
        try {
            const response = await fetch('data.json?v=' + Date.now());
            const teams = await response.json();
            
            // Puan ve Averaj sıralaması
            teams.sort((a, b) => b.pts - a.pts || b.gd - a.gd);

            const container = document.getElementById('league-content');
            
            // Önce görünmez başlık satırını ekle (hizalama için)
            let html = `<div class="row header-row"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>`;

            // Takımları ekle
            teams.forEach((t, i) => {
                html += `
                <div class="row">
                    <div class="right">${i + 1}</div>
                    <div class="team-name">${t.name}</div>
                    <div class="center">${t.p}</div>
                    <div class="center">${t.w}</div>
                    <div class="center">${t.d}</td>
                    <div class="center">${t.l}</div>
                    <div class="center">${t.gd}</div>
                    <div class="center pts">${t.pts}</div>
                </div>`;
            });

            container.innerHTML = html;
        } catch (e) { console.error("Veri hatası:", e); }
    }

    updateLeague();
    setInterval(updateLeague, 30000);
</script>

</body>
</html>
