<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TETA LEAGUE S4 - LIVE</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #02051a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", Arial, sans-serif;
            overflow-x: hidden;
            padding: 20px;
        }

        .wrapper {
            position: relative;
            width: min(94vw, 980px);
            aspect-ratio: 1 / 1;
            background-image: url("teta-tablo.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
        }

        .last-update {
            position: absolute;
            left: 58px;
            top: 108px;
            color: rgba(255, 255, 255, 0.78);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.35);
        }

        .overlay {
            position: absolute;
            top: 145px;
            left: 55px;
            width: 620px;
            padding: 18px 18px 14px;
            border-radius: 20px;
            background: rgba(3, 10, 35, 0.34);
            border: 1px solid rgba(0, 212, 255, 0.18);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.22);
        }

        .table-head,
        .row {
            display: grid;
            grid-template-columns: 42px 2.4fr 48px 48px 48px 48px 58px 68px;
            align-items: center;
            column-gap: 8px;
        }

        .table-head {
            color: #7defff;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            padding: 0 6px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .row {
            min-height: 42px;
            color: #ffffff;
            font-size: 17px;
            font-weight: 600;
            border-radius: 12px;
            padding: 3px 6px;
            transition: all 0.25s ease;
            margin-bottom: 3px;
        }

        .row:nth-child(even) {
            background: rgba(255, 255, 255, 0.035);
        }

        .top3 {
            background: rgba(255, 215, 0, 0.08) !important;
        }

        .bottom3 {
            background: rgba(255, 70, 70, 0.08) !important;
        }

        .num,
        .center {
            text-align: center;
        }

        .team {
            padding-left: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pts {
            color: #00d4ff;
            font-size: 23px;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.38);
        }

        .error-box {
            color: #ff8f8f;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            padding: 12px 8px;
        }

        @media (max-width: 900px) {
            .wrapper {
                width: 96vw;
            }

            .last-update {
                left: 6%;
                top: 14%;
                font-size: 10px;
            }

            .overlay {
                top: 18%;
                left: 6%;
                width: 58%;
                padding: 10px;
                border-radius: 14px;
            }

            .table-head,
            .row {
                grid-template-columns: 20px 1.8fr 24px 24px 24px 24px 30px 34px;
                column-gap: 4px;
            }

            .table-head {
                font-size: 8px;
                margin-bottom: 6px;
                padding: 0 2px 6px;
            }

            .row {
                min-height: 24px;
                font-size: 9px;
                padding: 2px;
                margin-bottom: 2px;
                border-radius: 8px;
            }

            .team {
                padding-left: 2px;
            }

            .pts {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="last-update" id="last-update">Güncelleniyor...</div>
        <div class="overlay" id="league-content"></div>
    </div>

    <script>
        function formatTime(date) {
            return date.toLocaleTimeString("tr-TR", {
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit"
            });
        }

        async function loadLeague() {
            const container = document.getElementById("league-content");
            const lastUpdate = document.getElementById("last-update");

            try {
                const res = await fetch("data.json?v=" + Date.now(), {
                    cache: "no-store"
                });

                if (!res.ok) {
                    throw new Error("Veri alınamadı.");
                }

                const teams = await res.json();

                teams.sort((a, b) => {
                    if (b.pts !== a.pts) return b.pts - a.pts;
                    if (b.gd !== a.gd) return b.gd - a.gd;
                    return a.name.localeCompare(b.name, "tr");
                });

                let html = `
                    <div class="table-head">
                        <div>#</div>
                        <div>TEAM</div>
                        <div>P</div>
                        <div>W</div>
                        <div>D</div>
                        <div>L</div>
                        <div>GD</div>
                        <div>PTS</div>
                    </div>
                `;

                teams.forEach((team, index) => {
                    let extraClass = "";
                    if (index < 3) extraClass = "top3";
                    else if (index >= teams.length - 3) extraClass = "bottom3";

                    const gdText = team.gd > 0 ? `+${team.gd}` : team.gd;

                    html += `
                        <div class="row ${extraClass}">
                            <div class="num">${index + 1}</div>
                            <div class="team" title="${team.name}">${team.name}</div>
                            <div class="center">${team.p}</div>
                            <div class="center">${team.w}</div>
                            <div class="center">${team.d}</div>
                            <div class="center">${team.l}</div>
                            <div class="center">${gdText}</div>
                            <div class="center pts">${team.pts}</div>
                        </div>
                    `;
                });

                container.innerHTML = html;
                lastUpdate.textContent = `Son güncelleme: ${formatTime(new Date())}`;
            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="error-box">Tablo yüklenemedi.</div>`;
                lastUpdate.textContent = "Son güncelleme alınamadı";
            }
        }

        loadLeague();
        setInterval(loadLeague, 30000);
    </script>
</body>
</html>
