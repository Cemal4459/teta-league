<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TETA LEAGUE S4 - LIVE</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #02051a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", Arial, sans-serif;
            padding: 16px;
        }

        .wrapper {
            position: relative;
            width: min(96vw, 1000px);
            aspect-ratio: 1 / 1;
            background: url("teta-tablo.png") center/cover no-repeat;
            overflow: hidden;
        }

        .board {
            position: absolute;
            top: 54%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 720px;
            border: 3px solid rgba(255, 255, 255, 0.92);
            border-radius: 16px;
            overflow: hidden;
            background: linear-gradient(
                to bottom,
                rgba(4, 8, 60, 0.24) 0%,
                rgba(4, 8, 60, 0.22) 38%,
                rgba(0, 0, 0, 0.78) 100%
            );
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.28);
        }

        .header-row,
        .table-row {
            display: grid;
            grid-template-columns: 12px 42px minmax(0, 2.2fr) 56px 56px 56px 56px 66px 70px;
            align-items: center;
        }

        .header-row {
            height: 54px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 800;
            border-bottom: 2px solid rgba(255, 255, 255, 0.92);
            background: rgba(0, 10, 80, 0.18);
        }

        .header-row .blank {
            grid-column: 1 / 3;
        }

        .header-row .team-head {
            padding-left: 14px;
        }

        .table-row {
            min-height: 60px;
            color: #ffffff;
            font-size: 18px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.82);
        }

        .table-row:last-child {
            border-bottom: none;
        }

        .rank-bar {
            width: 100%;
            height: 100%;
        }

        .rank-bar.top {
            background: #73f1ff;
        }

        .rank-bar.bottom {
            background: #ff5b6b;
        }

        .rank-bar.normal {
            background: transparent;
        }

        .rank {
            text-align: center;
            font-size: 19px;
            font-weight: 800;
        }

        .team-cell {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            padding-right: 8px;
        }

        .team-logo {
            width: 32px;
            height: 32px;
            object-fit: contain;
            flex-shrink: 0;
            border-radius: 50%;
        }

        .team-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 17px;
            font-weight: 600;
        }

        .stat,
        .pts {
            text-align: center;
            font-size: 18px;
            font-weight: 700;
        }

        .pts {
            font-size: 20px;
            font-weight: 900;
        }

        .error {
            padding: 28px;
            text-align: center;
            color: #ff9ca7;
            font-size: 18px;
            font-weight: 700;
        }

        @media (max-width: 900px) {
            .board {
                width: 88%;
                top: 54%;
                border-width: 2px;
                border-radius: 12px;
            }

            .header-row,
            .table-row {
                grid-template-columns: 8px 26px minmax(0, 1.8fr) 30px 30px 30px 30px 36px 40px;
            }

            .header-row {
                height: 36px;
                font-size: 10px;
            }

            .table-row {
                min-height: 40px;
                font-size: 11px;
            }

            .rank {
                font-size: 14px;
            }

            .team-logo {
                width: 20px;
                height: 20px;
            }

            .team-cell {
                gap: 7px;
            }

            .team-name,
            .stat,
            .pts {
                font-size: 11px;
            }

            .pts {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="board" id="leagueBoard">
            <div class="header-row">
                <div class="blank"></div>
                <div class="team-head">TEAMS</div>
                <div>P</div>
                <div>W</div>
                <div>D</div>
                <div>L</div>
                <div>GD</div>
                <div>PTS</div>
            </div>
        </div>
    </div>

    <script>
        function getRankClass(index, total) {
            if (index < 8) return "top";
            if (index >= total - 4) return "bottom";
            return "normal";
        }

        async function loadLeague() {
            const board = document.getElementById("leagueBoard");

            try {
                const res = await fetch("data.json?v=" + Date.now(), {
                    cache: "no-store"
                });

                if (!res.ok) {
                    throw new Error("data.json alınamadı");
                }

                const teams = await res.json();

                teams.sort((a, b) => {
                    if (b.pts !== a.pts) return b.pts - a.pts;
                    if (b.gd !== a.gd) return b.gd - a.gd;
                    return a.name.localeCompare(b.name, "tr");
                });

                let html = `
                    <div class="header-row">
                        <div class="blank"></div>
                        <div class="team-head">TEAMS</div>
                        <div>P</div>
                        <div>W</div>
                        <div>D</div>
                        <div>L</div>
                        <div>GD</div>
                        <div>PTS</div>
                    </div>
                `;

                teams.forEach((team, index) => {
                    const rankClass = getRankClass(index, teams.length);
                    const logo = team.logo ? team.logo : "logos/default.png";
                    const gdText = team.gd > 0 ? `+${team.gd}` : team.gd;

                    html += `
                        <div class="table-row">
                            <div class="rank-bar ${rankClass}"></div>
                            <div class="rank">${index + 1}</div>

                            <div class="team-cell">
                                <img
                                    class="team-logo"
                                    src="${logo}"
                                    alt="${team.name} logo"
                                    onerror="this.src='logos/default.png'"
                                >
                                <div class="team-name" title="${team.name}">${team.name}</div>
                            </div>

                            <div class="stat">${team.p}</div>
                            <div class="stat">${team.w}</div>
                            <div class="stat">${team.d}</div>
                            <div class="stat">${team.l}</div>
                            <div class="stat">${gdText}</div>
                            <div class="pts">${team.pts}</div>
                        </div>
                    `;
                });

                board.innerHTML = html;
            } catch (error) {
                console.error(error);
                board.innerHTML = `
                    <div class="header-row">
                        <div class="blank"></div>
                        <div class="team-head">TEAMS</div>
                        <div>P</div>
                        <div>W</div>
                        <div>D</div>
                        <div>L</div>
                        <div>GD</div>
                        <div>PTS</div>
                    </div>
                    <div class="error">Tablo yüklenemedi.</div>
                `;
            }
        }

        loadLeague();
        setInterval(loadLeague, 30000);
    </script>
</body>
</html>
