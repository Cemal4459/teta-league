<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TETA LEAGUE S4 - LIVE</title>
    <style>
        :root {
            --bg-page: #02051a; 
            --cyan: #00d4ff; 
        }

        body {
            background-color: var(--bg-page);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Ana Kart (Yuvarlak içine aldığın yer) */
        .league-container {
            width: 850px;
            /* ARKA PLAN BURADA */
            background-image: linear-gradient(rgba(5, 10, 48, 0.85), rgba(5, 10, 48, 0.85)), url('arka-plan.jpg');
            background-size: cover;
            background-position: center;
            
            border: 3px solid white; 
            border-radius: 25px;
            padding: 40px;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
            overflow: hidden; /* Dikey yazının karttan taşmasını engeller */
        }

        /* Dikey GROUP DELTA Yazısı (Kartın içine aldık) */
        .vertical-text {
            position: absolute;
            right: 20px; /* Kartın en sağ iç kısmına çektik */
            top: 50%;
            transform: rotate(90deg) translateY(-50%);
            transform-origin: right center; /* Sağa yaslı dönmesini sağlar */
            font-size: 5.5rem;
            font-weight: 900;
            color: var(--cyan);
            opacity: 0.4;
            letter-spacing: 10px;
            white-space: nowrap;
            text-transform: uppercase;
            z-index: 1;
            pointer-events: none;
        }

        .header {
            text-align: center;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 6px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        .header span { color: var(--cyan); }

        table {
            width: 100%;
            border-collapse: collapse;
            position: relative;
            z-index: 2; /* Tablo yazıları dikey yazının üstünde kalsın */
        }

        thead tr { border-bottom: 2px solid white; }
        th { padding: 12px; font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; }
        td { padding: 15px 10px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); font-size: 1.1rem; }

        .team-cell { text-align: left; display: flex; align-items: center; gap: 20px; font-weight: 600; }
        .rank-number { font-size: 1.2rem; font-weight: 900; width: 25px; }

        .pts-column {
            color: var(--cyan);
            font-weight: 900;
            font-size: 1.3rem;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.7);
        }
    </style>
</head>
<body>

    <div class="league-container">
        <div class="header">TETA LEAGUE <span>S4</span></div>
        <div class="vertical-text">GROUP DELTA</div>
        
        <table>
            <thead>
                <tr>
                    <th style="text-align: left; padding-left: 45px;">TEAMS</th>
                    <th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>PTS</th>
                </tr>
            </thead>
            <tbody id="league-body"></tbody>
        </table>
    </div>

    <script>
        async function loadTable() {
            try {
                const res = await fetch('data.json?v=' + Date.now());
                const teams = await res.json();
                teams.sort((a, b) => b.pts - a.pts || b.gd - a.gd);
                const tbody = document.getElementById('league-body');
                tbody.innerHTML = teams.map((t, i) => `
                    <tr>
                        <td class="team-cell">
                            <span class="rank-number">${i + 1}</span>
                            ${t.name}
                        </td>
                        <td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td><td>${t.gd}</td>
                        <td class="pts-column">${t.pts}</td>
                    </tr>
                `).join('');
            } catch (error) { console.error("Hata:", error); }
        }
        loadTable();
        setInterval(loadTable, 30000);
    </script>
</body>
</html>
